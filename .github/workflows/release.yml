name: Release Obsidian plugin

on:
  push:
    tags:
      # Semver-only filter. Glob "[0-9]*" requires the tag to start with a
      # digit, which matches versioned releases (0.11.0, 1.0.0, …) and
      # excludes the project's local-sync refs (test-sync, handbook-sync).
      # Pushing a sync tag previously triggered this workflow and created
      # bogus published releases under the sync-tag name.
      - "[0-9]*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Check for existing draft release (created by release-drafter)
          existing=$(gh release list --json tagName,isDraft -q '.[] | select(.isDraft) | .tagName' | head -1)

          if [ -n "$existing" ]; then
            # Upload assets to existing draft and update tag/title
            gh release upload "$existing" main.js manifest.json styles.css --clobber
            gh release edit "$existing" --tag "$tag" --title "$tag" --draft=false
          else
            # No draft exists — create and publish directly
            gh release create "$tag" \
              --title="$tag" \
              main.js manifest.json styles.css
          fi
