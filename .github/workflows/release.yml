name: Release Obsidian plugin

on:
  push:
    tags:
      # Semver-only filter. Glob "[0-9]*" requires the tag to start with a
      # digit, which matches versioned releases (0.11.0, 1.0.0, …) and
      # excludes the project's local-sync refs (test-sync, handbook-sync).
      # Pushing a sync tag previously triggered this workflow and created
      # bogus published releases under the sync-tag name.
      - "[0-9]*"

# Split into two jobs so that npm install (which can run third-party
# postinstall scripts) never executes in the same job as the OIDC
# `id-token: write` permission. Build deps cannot exfiltrate the
# attestation signing identity.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # SHA-pinned (v6.0.2) — all actions pinned for supply-chain consistency.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Don't leave GITHUB_TOKEN in .git/config where postinstall
          # scripts could pick it up.
          persist-credentials: false

      - name: Use Node.js
        # SHA-pinned (v6.4.0).
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20.x"

      - name: Build plugin
        # --ignore-scripts blocks postinstall lifecycle hooks across the
        # whole dep tree. esbuild and our other deps do not require them.
        # npm ci honors the lockfile exactly (no silent drift).
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Upload build artifacts
        # SHA-pinned (v7.0.1) for supply-chain hardening consistency
        # with the attest step. Bump SHA together with comment.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: plugin-build
          path: |
            main.js
            styles.css
            manifest.json
          retention-days: 1
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Sigstore OIDC + attestation publishing. Scoped to this job only,
      # which runs no npm install and no third-party code beyond the
      # pinned attest action.
      id-token: write
      attestations: write
    steps:
      # SHA-pinned (v6.0.2).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Download build artifacts
        # SHA-pinned (v8.0.1).
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: plugin-build

      - name: Attest build provenance
        # SHA-pinned (v4.1.0). When bumping, update both SHA and comment.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Check for existing draft release (created by release-drafter)
          existing=$(gh release list --json tagName,isDraft -q '.[] | select(.isDraft) | .tagName' | head -1)

          if [ -n "$existing" ]; then
            # Upload assets to existing draft and update tag/title
            gh release upload "$existing" main.js manifest.json styles.css --clobber
            gh release edit "$existing" --tag "$tag" --title "$tag" --draft=false
          else
            # No draft exists — create and publish directly
            gh release create "$tag" \
              --title="$tag" \
              main.js manifest.json styles.css
          fi
